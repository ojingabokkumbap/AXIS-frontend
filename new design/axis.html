<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>AXIS Design Set</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #F5F5F7; font-family: 'Noto Sans KR', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/cert-guide.jsx"></script>
<script type="text/babel" src="screens/cbt-entry.jsx"></script>
<script type="text/babel" src="screens/cbt-exam.jsx"></script>
<script type="text/babel" src="screens/cbt-warning.jsx"></script>
<script type="text/babel" src="screens/result.jsx"></script>
<script type="text/babel">
const App = () => (
  <DesignCanvas title="AXIS — AI 실무역량 민간자격" subtitle="axisexam.com + cbt.axisexam.com · 핵심 화면 6종">
    <DCSection id="main-site" title="① axisexam.com — 메인 사이트">
      <DCArtboard id="home" label="홈 (메인 랜딩)" width={1440} height={2620}><HomeScreen /></DCArtboard>
      <DCArtboard id="cert-guide" label="자격 안내 — AXIS" width={1440} height={1340}><CertGuideScreen /></DCArtboard>
    </DCSection>
    <DCSection id="cbt" title="② cbt.axisexam.com — CBT 시험 (다크 테마)">
      <DCArtboard id="cbt-entry" label="시험 입장" width={1440} height={900}><CbtEntryScreen /></DCArtboard>
      <DCArtboard id="cbt-exam" label="L3 응시 화면" width={1440} height={900}><CbtExamScreen /></DCArtboard>
    </DCSection>
    <DCSection id="proctor" title="③ AI 감독 / 결과">
      <DCArtboard id="cbt-warning" label="실시간 경고 오버레이" width={1440} height={900}><CbtWarningScreen /></DCArtboard>
      <DCArtboard id="result" label="시험 결과 (합격)" width={1440} height={900}><ResultScreen /></DCArtboard>
    </DCSection>
  </DesignCanvas>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
