<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>AXIS Admin — 운영자 포털</title>
  <meta name="viewport" content="width=1280"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="page-dashboard.jsx"></script>
  <script type="text/babel" src="page-schedule-questions.jsx"></script>
  <script type="text/babel" src="page-reg-examinees.jsx"></script>
  <script type="text/babel" src="page-mon-grade-result.jsx"></script>
  <script type="text/babel" src="page-content-stats.jsx"></script>
  <script type="text/babel" src="page-evidence.jsx"></script>

  <script type="text/babel">
    function App() {
      const initial = (location.hash || "#dashboard").replace("#", "");
      const [active, setActive] = React.useState(initial);
      const examInProgress = true;

      React.useEffect(() => {
        const h = () => setActive((location.hash || "#dashboard").replace("#", ""));
        window.addEventListener("hashchange", h);
        return () => window.removeEventListener("hashchange", h);
      }, []);

      const go = (id) => { location.hash = "#" + id; setActive(id); };
      const isDark = window.PAGE_TITLES?.[active]?.dark;

      let Page = null;
      switch (active) {
        case "dashboard": Page = <Dashboard onNav={go}/>; break;
        case "schedule": Page = <Schedule/>; break;
        case "questions": Page = <Questions/>; break;
        case "registrations": Page = <Registrations/>; break;
        case "examinees": Page = <Examinees/>; break;
        case "monitor": Page = <Monitoring/>; break;
        case "evidence": Page = <Evidence/>; break;
        case "grading": Page = <Grading/>; break;
        case "results": Page = <Results/>; break;
        case "notices":
        case "qna": Page = <Content/>; break;
        case "stats": Page = <Stats/>; break;
        default: Page = <Dashboard onNav={go}/>;
      }

      return (
        <div className="shell">
          <Sidebar active={active} onSelect={go} examInProgress={examInProgress}/>
          <main className={"main" + (isDark ? " main-dark" : "")} data-screen-label={active}>
            <TopBar active={active} examInProgress={examInProgress} onJumpMonitor={() => go("monitor")}/>
            <div className="page">{Page}</div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
