name: Deploy frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, axis-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install, build, and restart
        env:
          HOME: /root
          PM2_HOME: /root/.pm2
        run: |
          cd /web/axis/AXIS-frontend
          git fetch origin main
          git reset --hard origin/main
          npm ci
          npm run build
          pm2 restart axis-frontend
